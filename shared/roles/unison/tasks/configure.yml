---
# Deploy Unison profile and wsync wrapper script.

- name: Ensure Unison config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.unison"
    state: directory
    mode: "0755"

- name: Deploy base Unison code-sync profile
  ansible.builtin.template:
    src: code-sync.prf.j2
    dest: "{{ ansible_facts.env.HOME }}/.unison/code-sync.prf"
    mode: "0644"

- name: Ensure code directory exists
  ansible.builtin.file:
    path: "{{ unison_code_dir }}"
    state: directory
    mode: "0755"

- name: Install wsync wrapper script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/wsync"
    dest: "{{ ansible_facts.env.HOME }}/.local/bin/wsync"
    mode: "0755"

- name: Ensure wsync config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/wsync"
    state: directory
    mode: "0755"

- name: Write extra-dirs config
  ansible.builtin.copy:
    content: "{{ unison_extra_dirs | join('\n') }}\n"
    dest: "{{ ansible_facts.env.HOME }}/.config/wsync/extra-dirs"
    mode: "0644"
  when: unison_extra_dirs | length > 0
