---
# Moonlight — open-source game/desktop streaming client.
# Receives streams from Sunshine. Used on the "receiving" device
# (tablet, laptop, etc.) to display the extended desktop.
# https://github.com/moonlight-stream/moonlight-qt

- name: Install Moonlight (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: moonlight
    state: present

- name: Install Moonlight (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Ensure Flatpak is installed
      ansible.builtin.apt:
        name: flatpak
        state: present
      become: true

    - name: Ensure Flathub remote is configured
      ansible.builtin.command: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      become: true

    - name: Check if Moonlight Flatpak is installed
      ansible.builtin.command: flatpak info com.moonlight_stream.Moonlight
      register: _moonlight_flatpak
      changed_when: false
      failed_when: false

    - name: Install Moonlight via Flatpak
      when: _moonlight_flatpak.rc != 0
      ansible.builtin.command: flatpak install -y flathub com.moonlight_stream.Moonlight
      become: true
