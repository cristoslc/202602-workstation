---
# Text Expansion role: Espanso (Linux) / placeholder (macOS)

- name: Install Espanso (Debian)
  when: ansible_os_family == "Debian"
  ansible.builtin.include_tasks: debian.yml

- name: Note about text expansion (macOS)
  when: ansible_os_family == "Darwin"
  ansible.builtin.debug:
    msg: "Text expansion on macOS is handled by Raycast snippets."
