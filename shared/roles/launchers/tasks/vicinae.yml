---
# Vicinae sub-task (Debian only)
- name: Install Vicinae (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check if Vicinae is installed
      ansible.builtin.command: which vicinae
      register: vicinae_check
      changed_when: false
      failed_when: false

    - name: Install Vicinae
      when: vicinae_check.rc != 0
      block:
        - name: Download Vicinae install script
          ansible.builtin.get_url:
            url: https://vicinae.com/install.sh
            dest: /tmp/vicinae-install.sh
            mode: "0755"
          register: _vicinae_download
          retries: 3
          delay: 5
          until: _vicinae_download is not failed

        - name: Run Vicinae install script
          ansible.builtin.command: bash /tmp/vicinae-install.sh
          become: true

        - name: Clean up Vicinae install script
          ansible.builtin.file:
            path: /tmp/vicinae-install.sh
            state: absent

    - name: Install Vicinae icon
      ansible.builtin.copy:
        src: /usr/local/lib/vicinae/usr/share/icons/hicolor/512x512/apps/vicinae.png
        dest: /usr/share/icons/hicolor/512x512/apps/vicinae.png
        remote_src: true
        mode: "0644"
      become: true
      register: vicinae_icon

    - name: Update icon cache
      ansible.builtin.command: gtk-update-icon-cache -f /usr/share/icons/hicolor
      become: true
      when: vicinae_icon.changed  # noqa: no-handler
      changed_when: true

    - name: Install Vicinae URL handler
      ansible.builtin.copy:
        src: vicinae-url-handler.desktop
        dest: "{{ ansible_facts.env.HOME }}/.local/share/applications/vicinae-url-handler.desktop"
        mode: "0644"

    - name: Register Vicinae URL handler
      ansible.builtin.command: xdg-mime default vicinae-url-handler.desktop x-scheme-handler/vicinae
      changed_when: false
      failed_when: false

    - name: Enable Vicinae autostart
      ansible.builtin.file:
        src: /usr/local/share/applications/vicinae.desktop
        dest: "{{ ansible_facts.env.HOME }}/.config/autostart/vicinae.desktop"
        state: link
