---
# Raycast sub-task (macOS only)
- name: Install Raycast (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Install Raycast
      community.general.homebrew_cask:
        name: raycast
        state: present

    - name: Check if age-encrypted Raycast export exists
      ansible.builtin.stat:
        path: "{{ workstation_dir }}/macos/files/raycast/raycast.rayconfig.age"
      register: raycast_export

    - name: Ensure cache directory exists for Raycast import
      when: raycast_export.stat.exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.cache/workstation"
        state: directory
        mode: "0755"

    - name: Decrypt Raycast export for import
      when: raycast_export.stat.exists
      ansible.builtin.command:
        cmd: >
          age -d
          -i {{ ansible_env.HOME }}/.config/sops/age/keys.txt
          -o {{ ansible_env.HOME }}/.cache/workstation/raycast-import.rayconfig
          {{ workstation_dir }}/macos/files/raycast/raycast.rayconfig.age
        creates: "{{ ansible_env.HOME }}/.cache/workstation/raycast-import.rayconfig"

    - name: Open Raycast settings import
      when: raycast_export.stat.exists
      ansible.builtin.command:
        cmd: "open {{ ansible_env.HOME }}/.cache/workstation/raycast-import.rayconfig"
      register: raycast_import_open
      changed_when: false

    - name: Wait for user to confirm Raycast import dialog
      when: raycast_export.stat.exists
      ansible.builtin.pause:
        prompt: >-
          Raycast import dialog should be open.
          Confirm the import in Raycast, then press Enter to continue.

    - name: Clean up decrypted Raycast export
      when: raycast_export.stat.exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.cache/workstation/raycast-import.rayconfig"
        state: absent

    - name: Note about Raycast configuration
      when: not raycast_export.stat.exists
      ansible.builtin.debug:
        msg: >
          Raycast is installed but no settings export found.
          Configure manually, then run: make raycast-export
