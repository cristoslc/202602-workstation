---
# Docker MCP Gateway — idempotent server enablement and client setup.
# Enables the MCP Toolkit in Docker Desktop settings, then enables
# catalog servers and wires Claude Code to them.

- name: Set Docker Desktop settings path
  ansible.builtin.set_fact:
    _dd_settings_path: >-
      {{ (ansible_facts.os_family == 'Darwin')
         | ternary(
             ansible_env.HOME ~ '/Library/Group Containers/group.com.docker/settings-store.json',
             ansible_env.HOME ~ '/.docker/desktop/settings-store.json')
      }}

- name: Read Docker Desktop settings
  ansible.builtin.slurp:
    src: "{{ _dd_settings_path }}"
  register: _dd_settings_raw
  failed_when: false

- name: Parse Docker Desktop settings
  when: _dd_settings_raw.content is defined
  ansible.builtin.set_fact:
    _dd_settings: "{{ _dd_settings_raw.content | b64decode | from_json }}"

- name: Enable MCP Toolkit in Docker Desktop settings
  when:
    - _dd_settings is defined
    - not (_dd_settings.get('EnableDockerMCPToolkit', false) or _dd_settings.get('enableDockerMCPToolkit', false))
  ansible.builtin.copy:
    content: "{{ _dd_settings | combine({'EnableDockerMCPToolkit': true}) | to_nice_json }}\n"
    dest: "{{ _dd_settings_path }}"
    mode: "0644"
  register: _dd_mcp_enabled

- name: Restart Docker Desktop after enabling MCP Toolkit
  when: _dd_mcp_enabled is changed  # noqa: no-handler
  block:
    - name: Restart Docker Desktop (Linux)
      ansible.builtin.systemd:
        name: docker-desktop
        scope: user
        state: restarted
      when: ansible_facts.os_family != 'Darwin'
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.user_uid }}"
      failed_when: false

    - name: Restart Docker Desktop (macOS)
      ansible.builtin.shell: osascript -e 'tell application "Docker" to quit' && sleep 5 && open -a Docker
      when: ansible_facts.os_family == 'Darwin'
      failed_when: false

    - name: Wait for Docker daemon to be ready
      ansible.builtin.command: docker info
      register: _docker_ready
      retries: 18
      delay: 10
      until: _docker_ready.rc == 0
      changed_when: false

- name: Check docker mcp CLI availability
  ansible.builtin.command: docker mcp server ls
  register: _docker_mcp_check
  changed_when: false
  failed_when: false
  retries: 12
  delay: 5
  until: _docker_mcp_check.rc == 0

- name: Skip MCP setup if CLI unavailable
  when: _docker_mcp_check.rc != 0
  ansible.builtin.debug:
    msg: >-
      docker mcp CLI not available after {{ 12 * 5 }}s.
      Install Docker Desktop 4.59+ or the docker-mcp CLI plugin, then re-run.

- name: Configure Docker MCP servers
  when: _docker_mcp_check.rc == 0
  block:
    - name: Get enabled servers
      ansible.builtin.command: docker mcp server ls --json
      register: _mcp_servers_json
      changed_when: false

    - name: Parse enabled server names
      ansible.builtin.set_fact:
        _mcp_enabled_servers: "{{ (_mcp_servers_json.stdout | from_json) | map(attribute='name') | list }}"

    - name: Enable MCP servers
      ansible.builtin.command: docker mcp server enable {{ item }}
      loop: "{{ docker_mcp_servers }}"
      when: item not in _mcp_enabled_servers
      register: _mcp_server_enable
      changed_when: _mcp_server_enable.rc == 0
      retries: 6
      delay: 10
      until: _mcp_server_enable.rc == 0

    - name: Set Brave Search API key
      ansible.builtin.shell: echo '{{ docker_mcp_brave_api_key }}' | docker mcp secret set BRAVE_API_KEY
      when: docker_mcp_brave_api_key | length > 0
      no_log: true
      changed_when: false

    - name: Connect Claude Code to MCP servers
      ansible.builtin.command: docker mcp client connect claude-code --global
      register: _mcp_client_connect
      changed_when: "'already' not in (_mcp_client_connect.stdout | default(''))"
      failed_when: false
