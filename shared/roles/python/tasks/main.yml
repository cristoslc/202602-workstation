---
- name: Check if uv is installed
  ansible.builtin.command: uv --version
  register: uv_check
  changed_when: false
  failed_when: false

- name: Install uv
  when: uv_check.rc != 0
  ansible.builtin.shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"

- name: Install default Python via uv
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/uv python install {{ python_version }}"
  register: python_install
  changed_when: "'Installed' in python_install.stdout"
