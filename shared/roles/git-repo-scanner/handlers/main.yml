---
- name: Restart git-repo-scanner-watch (Linux)
  when: ansible_facts.os_family != 'Darwin'
  ansible.builtin.systemd:
    name: git-repo-scanner-watch
    state: restarted
    scope: user
    daemon_reload: true
  become: false

- name: Restart git-repo-scanner (macOS)
  when: ansible_facts.os_family == 'Darwin'
  ansible.builtin.shell: |
    launchctl unload ~/Library/LaunchAgents/com.workstation.git-repo-scanner.plist 2>/dev/null || true
    launchctl load ~/Library/LaunchAgents/com.workstation.git-repo-scanner.plist
  changed_when: true
