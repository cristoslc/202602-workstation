---
# Sync hub health monitor: periodic connectivity checks with debounced alerts.

- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.local/bin"
    state: directory
    mode: "0755"

- name: Template sync health check script
  ansible.builtin.template:
    src: sync-health-check.sh.j2
    dest: "{{ ansible_facts.env.HOME }}/.local/bin/sync-health-check"
    mode: "0755"

# -- Linux: systemd user timer -----------------------------------------------

- name: Configure sync monitor (Linux)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Ensure systemd user directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/systemd/user"
        state: directory
        mode: "0755"

    - name: Template sync staleness service
      ansible.builtin.template:
        src: sync-staleness.service.j2
        dest: "{{ ansible_facts.env.HOME }}/.config/systemd/user/sync-staleness.service"
        mode: "0644"

    - name: Template sync staleness timer
      ansible.builtin.template:
        src: sync-staleness.timer.j2
        dest: "{{ ansible_facts.env.HOME }}/.config/systemd/user/sync-staleness.timer"
        mode: "0644"

    - name: Reload systemd user daemon for sync monitor
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Enable and start sync staleness timer
      ansible.builtin.systemd:
        name: sync-staleness.timer
        state: started
        enabled: true
        scope: user

# -- macOS: launchd agent -----------------------------------------------------

- name: Configure sync monitor (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Ensure LaunchAgents directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents"
        state: directory
        mode: "0755"

    - name: Template sync staleness launchd plist
      ansible.builtin.template:
        src: com.workstation.sync-staleness.plist.j2
        dest: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.workstation.sync-staleness.plist"
        mode: "0644"

    - name: Load sync staleness launchd agent
      ansible.builtin.command:
        cmd: launchctl load -w {{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.workstation.sync-staleness.plist
      register: _sync_staleness_launchctl
      changed_when: _sync_staleness_launchctl.rc == 0
      failed_when: false
