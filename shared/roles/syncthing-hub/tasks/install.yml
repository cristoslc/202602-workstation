---
# Install Syncthing on the hub server (Debian/Ubuntu).

- name: Check if Syncthing GPG keyring exists
  ansible.builtin.stat:
    path: /usr/share/keyrings/syncthing-archive-keyring.gpg
  register: syncthing_keyring

- name: Download and dearmor Syncthing GPG key
  when: not syncthing_keyring.stat.exists
  block:
    - name: Download Syncthing release key
      ansible.builtin.get_url:
        url: https://syncthing.net/release-key.gpg
        dest: /tmp/syncthing-release-key.gpg
        mode: "0644"
      retries: 3
      delay: 5

    - name: Dearmor Syncthing GPG key to keyring
      ansible.builtin.command:
        cmd: gpg --dearmor -o /usr/share/keyrings/syncthing-archive-keyring.gpg /tmp/syncthing-release-key.gpg
        creates: /usr/share/keyrings/syncthing-archive-keyring.gpg
      become: true

    - name: Clean up temporary GPG key
      ansible.builtin.file:
        path: /tmp/syncthing-release-key.gpg
        state: absent

- name: Add Syncthing apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/syncthing-archive-keyring.gpg] https://apt.syncthing.net/ syncthing stable"
    filename: syncthing
    state: present
  become: true

- name: Install Syncthing
  ansible.builtin.apt:
    name: syncthing
    state: present
    update_cache: true
  become: true

- name: Create Syncthing system user
  ansible.builtin.user:
    name: "{{ syncthing_hub_user }}"
    system: true
    home: "/home/{{ syncthing_hub_user }}"
    shell: /usr/sbin/nologin
    create_home: true
  become: true

- name: Create hub data directory
  ansible.builtin.file:
    path: "{{ syncthing_hub_data_dir }}"
    state: directory
    owner: "{{ syncthing_hub_user }}"
    group: "{{ syncthing_hub_user }}"
    mode: "0755"
  become: true

- name: Create user data subdirectories on hub
  ansible.builtin.file:
    path: "{{ syncthing_hub_data_dir }}/{{ item }}"
    state: directory
    owner: "{{ syncthing_hub_user }}"
    group: "{{ syncthing_hub_user }}"
    mode: "0755"
  loop: "{{ syncthing_hub_user_folders }}"
  become: true

- name: Deploy .stignore to each hub folder
  ansible.builtin.copy:
    src: "{{ role_path }}/../syncthing/files/stignore"
    dest: "{{ syncthing_hub_data_dir }}/{{ item }}/.stignore"
    owner: "{{ syncthing_hub_user }}"
    group: "{{ syncthing_hub_user }}"
    mode: "0644"
  loop: "{{ syncthing_hub_user_folders }}"
  become: true

- name: Enable and start Syncthing service for hub user
  ansible.builtin.systemd:
    name: "syncthing@{{ syncthing_hub_user }}"
    enabled: true
    state: started
    daemon_reload: true
  become: true
