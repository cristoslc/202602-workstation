---
# macOS: Keka installed via Brewfile. Verify presence.

- name: Verify Keka is installed
  ansible.builtin.command: brew list --cask keka
  register: keka_check
  changed_when: false
  failed_when: false

- name: Note about Keka
  when: keka_check.rc != 0
  ansible.builtin.debug:
    msg: "Keka not installed. Add 'keka' to Brewfile and run brew bundle."
