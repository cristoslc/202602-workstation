---
# Linux: install Tailscale and Surfshark via their repos.

- name: Install Tailscale via official script
  ansible.builtin.shell: |
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
  become: true

- name: Download and install Surfshark
  ansible.builtin.shell: |
    curl -fsSL https://ocean.surfshark.com/debian/pool/main/s/surfshark-release/surfshark-release_1.0.0-2.1_amd64.deb -o /tmp/surfshark-release.deb
    dpkg -i /tmp/surfshark-release.deb
    apt-get update
    apt-get install -y surfshark
    rm -f /tmp/surfshark-release.deb
  args:
    creates: /usr/bin/surfshark
  become: true
