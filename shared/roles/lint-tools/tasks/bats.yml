---
# bats sub-task
- name: Install bats (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew:
    name: bats-core
    state: present

- name: Install bats (Debian)
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.apt:
    name: bats
    state: present
  become: true
