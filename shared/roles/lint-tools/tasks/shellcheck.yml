---
# shellcheck sub-task
- name: Install shellcheck (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew:
    name: shellcheck
    state: present

- name: Install shellcheck (Debian)
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.apt:
    name: shellcheck
    state: present
  become: true
