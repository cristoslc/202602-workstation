---
# Restic + Backrest backup stack defaults.
#
# Secrets (repo password, B2 credentials, notification URLs) are in
# shared/secrets/vars.sops.yml — edit with: make edit-secrets-shared

# ── Restic (Linux binary install; macOS uses Homebrew) ──────────────
restic_version: "0.18.1"
restic_sha256: "680838f19d67151adba227e1570cdd8af12c19cf1735783ed1ba928bc41f363d"
restic_url: "https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_amd64.bz2"
restic_repo: "restic/restic"

# ── Backrest (Linux binary install; macOS uses Homebrew tap) ────────
backrest_version: "1.12.0"
backrest_sha256: "df6ab22e0b4d8f10f5f8f050ffc4fa396908c66e8b5cb0e539c891239809d5dd"
backrest_url: "https://github.com/garethgeorge/backrest/releases/download/v{{ backrest_version }}/backrest_Linux_x86_64.tar.gz"
backrest_repo: "garethgeorge/backrest"

# ── Repository — B2-direct (v1) ────────────────────────────────────
# @tui secret label="B2 bucket name" placeholder="my-workstation-backups"
restic_b2_bucket: ""               # e.g. "my-workstation-backups"
# @tui secret password label="Restic repo password"
restic_repo_password: ""           # Restic encryption key

# @tui secret password label="B2 master key ID" placeholder="00abc..."
b2_master_key_id: ""               # from SOPS — used by Terraform
# @tui secret password label="B2 master key"
b2_master_key: ""

# @tui skip — auto-provisioned by Terraform
restic_b2_account_id: ""
# @tui skip — auto-provisioned by Terraform
restic_b2_account_key: ""

# Create B2 bucket via Terraform (true for first workstation, false for subsequent)
b2_create_bucket: true

# ── Backrest ────────────────────────────────────────────────────────
backrest_port: "127.0.0.1:9898"

# ── SwiftBar (macOS menu bar) ─────────────────────────────────────
swiftbar_plugin_dir: "{{ ansible_facts.env.HOME }}/Documents/dotfiles/SwiftBar"

# ── Retention ───────────────────────────────────────────────────────
restic_keep_daily: 365
restic_keep_weekly: 52
restic_keep_monthly: 24
restic_keep_yearly: 5

# ── Schedule (cron syntax — Backrest format) ────────────────────────
restic_backup_schedule: "0 */4 * * *"
restic_prune_schedule: "0 3 * * 0"

# ── Bandwidth (0 = unlimited; KiB/s) ───────────────────────────────
restic_upload_limit: 0
restic_download_limit: 0

# ── Notifications ───────────────────────────────────────────────────
# @tui secret optional label="Shoutrrr notification URL" placeholder="discord://token@id"
restic_shoutrrr_url: ""
restic_heartbeat_file: "{{ ansible_facts.env.HOME }}/.local/log/restic-heartbeat.log"
restic_stale_threshold_hours: 8
restic_stale_check_interval: "2h"
restic_stale_check_interval_seconds: 7200

# ── Backup paths (positive inclusion) ─────────────────────────────
# Only these directories are backed up. Everything else is ignored.
# Non-existent paths are filtered out at template time (see backrest.yml).
restic_backup_paths:
  - "{{ ansible_facts.env.HOME }}/Documents"
  - "{{ ansible_facts.env.HOME }}/Desktop"
  - "{{ ansible_facts.env.HOME }}/Downloads"
  - "{{ ansible_facts.env.HOME }}/Pictures"
  - "{{ ansible_facts.env.HOME }}/Music"
  - "{{ ansible_facts.env.HOME }}/Movies"
  - "{{ ansible_facts.env.HOME }}/Screenshots"
  - "{{ ansible_facts.env.HOME }}/.config"
  - "{{ ansible_facts.env.HOME }}/.local/bin"
  - "{{ ansible_facts.env.HOME }}/.ssh"
  - "{{ ansible_facts.env.HOME }}/.gnupg"
  - "{{ ansible_facts.env.HOME }}/.local/share/keyrings"

# Extra paths to include (per-host override)
restic_extra_paths: []

# ── Excludes (applied within included paths) ─────────────────────
restic_excludes:
  - ".DS_Store"
  - "Thumbs.db"
  - "**/__pycache__"
  - "**/*.pyc"
  - "**/node_modules"
  - "**/.venv"
  - "**/venv"
  - "**/.git/objects"

restic_extra_excludes: []

# ── Version check ───────────────────────────────────────────────────
skip_version_check: false
