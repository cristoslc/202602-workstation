---
# Linux: Timeshift for system backups

- name: Install Timeshift
  ansible.builtin.apt:
    name: timeshift
    state: present
  become: true

- name: Configure Timeshift
  ansible.builtin.template:
    src: timeshift.json.j2
    dest: /etc/timeshift/timeshift.json
    mode: "0644"
  become: true
