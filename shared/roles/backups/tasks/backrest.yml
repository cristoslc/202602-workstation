---
# Backrest sub-task: install Backrest + configure background service

- name: Install Backrest (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Tap Backrest Homebrew repository
      community.general.homebrew_tap:
        name: garethgeorge/homebrew-backrest-tap
        state: present

    - name: Install Backrest via Homebrew
      community.general.homebrew:
        name: backrest
        state: present

- name: Install Backrest (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check Backrest version
      ansible.builtin.include_tasks: "{{ workstation_dir }}/shared/tasks/version-check.yml"
      vars:
        tool_name: backrest
        tool_repo: "{{ backrest_repo }}"
        pinned_version: "{{ backrest_version }}"

    - name: Check if Backrest is installed at correct version
      ansible.builtin.shell: backrest version 2>/dev/null | grep -qF '{{ backrest_version }}'
      register: _backrest_installed
      changed_when: false
      failed_when: false

    - name: Download and verify Backrest
      when: _backrest_installed.rc != 0
      ansible.builtin.include_tasks: "{{ workstation_dir }}/shared/tasks/download-and-verify.yml"
      vars:
        download_url: "{{ backrest_url }}"
        expected_sha256: "{{ backrest_sha256 }}"
        tool_name: backrest

    - name: Extract Backrest binary
      when: _backrest_installed.rc != 0
      ansible.builtin.unarchive:
        src: "{{ _verified_download.path }}"
        dest: /usr/local/bin
        remote_src: true
        include:
          - backrest
        mode: "0755"
      become: true

    - name: Clean up Backrest temp file
      when: _backrest_installed.rc != 0 and _verified_download is defined
      ansible.builtin.file:
        path: "{{ _verified_download.path }}"
        state: absent

# ── Provision B2 bucket + per-workstation key via Terraform ─────────

- name: Provision B2 infrastructure
  ansible.builtin.include_tasks: b2-provision.yml
  when: restic_b2_bucket | length > 0 and b2_master_key_id | length > 0
  tags: [b2-provision]

# ── Restic timeout wrapper (both platforms) ──────────────────────────

- name: Template restic-wrapper script
  ansible.builtin.template:
    src: restic-wrapper.sh.j2
    dest: "{{ ansible_facts.env.HOME }}/.local/bin/restic-wrapper"
    mode: "0755"
  vars:
    restic_real_command: >-
      {{ '/opt/homebrew/bin/restic'
         if ansible_facts.os_family == 'Darwin'
         else '/usr/local/bin/restic' }}
  notify: restart backrest

# ── Configure Backrest (both platforms) ─────────────────────────────

- name: Ensure Backrest config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/backrest"
    state: directory
    mode: "0700"

- name: Ensure Backrest data directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.local/share/backrest"
    state: directory
    mode: "0700"

- name: Ensure heartbeat log directory exists
  ansible.builtin.file:
    path: "{{ restic_heartbeat_file | dirname }}"
    state: directory
    mode: "0755"

- name: Filter backup paths to those that exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ restic_backup_paths + restic_extra_paths }}"
  register: _backup_path_stats

- name: Build verified backup paths list
  ansible.builtin.set_fact:
    _restic_verified_paths: "{{ _backup_path_stats.results | selectattr('stat.exists') | map(attribute='item') | list }}"

- name: Template Backrest config
  ansible.builtin.template:
    src: backrest-config.json.j2
    dest: "{{ ansible_facts.env.HOME }}/.config/backrest/config.json"
    mode: "0600"
  no_log: true
  notify: restart backrest

# ── Systemd user service (Linux) ───────────────────────────────────

- name: Configure Backrest systemd user service (Linux)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Ensure systemd user directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/systemd/user"
        state: directory
        mode: "0755"

    - name: Template Backrest systemd user service
      ansible.builtin.template:
        src: backrest.service.j2
        dest: "{{ ansible_facts.env.HOME }}/.config/systemd/user/backrest.service"
        mode: "0644"
      notify: restart backrest

    - name: Reload systemd user daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Enable and start Backrest service
      ansible.builtin.systemd:
        name: backrest
        state: started
        enabled: true
        scope: user

# ── Launchd user agent (macOS — custom plist for BACKREST_RESTIC_COMMAND) ──

- name: Configure Backrest launchd agent (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Stop Homebrew-managed Backrest service (one-time migration)
      ansible.builtin.command:
        cmd: brew services stop backrest
      failed_when: false
      changed_when: false

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.local/log"
        state: directory
        mode: "0755"

    - name: Template Backrest launchd plist
      ansible.builtin.template:
        src: com.user.backrest.plist.j2
        dest: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.user.backrest.plist"
        mode: "0644"
      register: _backrest_plist

    - name: Unload old Backrest agent
      ansible.builtin.command:
        cmd: launchctl bootout gui/{{ ansible_facts.user_uid }} {{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.user.backrest.plist
      when: _backrest_plist.changed
      failed_when: false
      changed_when: false

    - name: Load Backrest launchd agent
      ansible.builtin.command:
        cmd: launchctl bootstrap gui/{{ ansible_facts.user_uid }} {{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.user.backrest.plist
      register: _backrest_launchctl
      changed_when: _backrest_launchctl.rc == 0
      failed_when: false

# ── Wake restart (both platforms) ──────────────────────────────────

- name: Install wake restart hook
  ansible.builtin.include_tasks: wake-restart.yml
  tags: [wake-restart]

# ── Staleness watcher (both platforms) ──────────────────────────────

- name: Install staleness watcher
  ansible.builtin.include_tasks: staleness-watcher.yml
  tags: [staleness-watcher]

# ── Tray indicator (both platforms) ─────────────────────────────────

- name: Install tray indicator
  ansible.builtin.include_tasks: tray-indicator.yml
  tags: [tray-indicator]
