---
# NormCap sub-task (Debian only)
# OCR-powered screen capture — select a region, text is extracted and
# copied to the clipboard. Lightweight Antinote equivalent for Linux.
- name: Install NormCap (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Ensure Flatpak is installed
      ansible.builtin.apt:
        name: flatpak
        state: present
      become: true

    - name: Ensure Flathub remote is configured
      ansible.builtin.command: flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      changed_when: false
      become: true

    - name: Check if NormCap Flatpak is installed
      ansible.builtin.command: flatpak info com.github.dynobo.normcap
      register: _normcap_flatpak
      changed_when: false
      failed_when: false

    - name: Install NormCap via Flatpak
      ansible.builtin.command: flatpak install -y flathub com.github.dynobo.normcap
      when: _normcap_flatpak.rc != 0
      become: true
