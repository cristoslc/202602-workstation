---
# macOS: browsers are installed via Brewfile.
# This task verifies they are present.

- name: Verify browsers are installed via Homebrew
  ansible.builtin.command: "brew list --cask {{ item.darwin_cask }}"
  loop: "{{ browsers }}"
  loop_control:
    label: "{{ item.name }}"
  register: browser_check
  changed_when: false
  failed_when: false

- name: Report missing browsers
  ansible.builtin.debug:
    msg: "{{ item.item.name }} not installed. Add '{{ item.item.darwin_cask }}' to Brewfile and run brew bundle."
  loop: "{{ browser_check.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0
