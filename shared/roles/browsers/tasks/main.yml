---
# Browsers role: install all browsers, set daily driver default.

- name: Install browsers (macOS)
  when: ansible_os_family == "Darwin"
  ansible.builtin.include_tasks: darwin.yml

- name: Install browsers (Debian)
  when: ansible_os_family == "Debian"
  ansible.builtin.include_tasks: debian.yml

- name: Set daily driver browser (Linux)
  when: ansible_os_family == "Debian"
  ansible.builtin.command: >
    xdg-settings set default-web-browser
    {{ (browsers | selectattr('name', 'equalto', daily_driver_browser) | first).linux_desktop }}
  changed_when: false
  failed_when: false

- name: Note about daily driver browser (macOS)
  when: ansible_os_family == "Darwin"
  ansible.builtin.debug:
    msg: >
      Daily driver browser is {{ daily_driver_browser }}.
      Set it as default manually in System Settings → Default web browser.
