---
# Brave browser sub-task
- name: Install Brave (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: brave-browser
    state: present

- name: Install Brave (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    # Brave key is already in gpg binary format — download directly to keyrings
    - name: Download Brave browser GPG key
      ansible.builtin.get_url:
        url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
        mode: "0644"
      become: true
      register: _brave_key_download
      retries: 3
      delay: 5
      until: _brave_key_download is not failed

    - name: Add Brave browser apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
        filename: brave-browser
        state: present
      become: true

    - name: Install Brave browser
      ansible.builtin.apt:
        name: brave-browser
        state: present
        update_cache: true
      become: true
