---
# Debian/Ubuntu: install browsers via apt and external repos.

- name: Verify Firefox is installed (Mint ships .deb by default)
  ansible.builtin.command: firefox --version
  register: firefox_check
  changed_when: false
  failed_when: false

- name: Install Firefox if not present
  when: firefox_check.rc != 0
  ansible.builtin.apt:
    name: firefox
    state: present
  become: true

# Brave: key is already in gpg binary format — download directly
- name: Download Brave browser GPG key
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"
  become: true

- name: Add Brave browser apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
    state: present
  become: true

- name: Install Brave browser
  ansible.builtin.apt:
    name: brave-browser
    state: present
    update_cache: true
  become: true

# Chrome: key is ASCII armored — download then dearmor
- name: Download Google Chrome GPG key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /tmp/google-chrome-key.pub
    mode: "0644"
  become: true

- name: Dearmor Google Chrome GPG key
  ansible.builtin.command: gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg /tmp/google-chrome-key.pub
  args:
    creates: /usr/share/keyrings/google-chrome-keyring.gpg
  become: true

- name: Clean up Chrome key temp file
  ansible.builtin.file:
    path: /tmp/google-chrome-key.pub
    state: absent
  become: true

- name: Add Google Chrome apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] https://dl.google.com/linux/chrome/deb/ stable main"
    state: present
  become: true

- name: Install Google Chrome
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true
  become: true
