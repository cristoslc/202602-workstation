---
# Editor role: VS Code installation and extensions

- name: Install VS Code (macOS)
  when: ansible_os_family == "Darwin"
  community.general.homebrew_cask:
    name: visual-studio-code
    state: present

- name: Install VS Code (Debian)
  when: ansible_os_family == "Debian"
  block:
    - name: Download Microsoft GPG key
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /tmp/microsoft-key.asc
        mode: "0644"
        force: true
      become: true

    - name: Dearmor Microsoft GPG key
      ansible.builtin.shell: |
        old_hash=""
        [ -f /usr/share/keyrings/microsoft.gpg ] && old_hash=$(sha256sum /usr/share/keyrings/microsoft.gpg | cut -d' ' -f1)
        gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft.gpg /tmp/microsoft-key.asc
        new_hash=$(sha256sum /usr/share/keyrings/microsoft.gpg | cut -d' ' -f1)
        [ "$old_hash" != "$new_hash" ] && echo "CHANGED" || echo "OK"
      args:
        executable: /bin/bash
      become: true
      register: _microsoft_dearmor
      changed_when: "'CHANGED' in _microsoft_dearmor.stdout"

    - name: Clean up Microsoft key temp file
      ansible.builtin.file:
        path: /tmp/microsoft-key.asc
        state: absent
      become: true

    - name: Add VS Code repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main"
        filename: vscode
        state: present
      become: true

    - name: Install VS Code
      ansible.builtin.apt:
        name: code
        state: present
        update_cache: true
      become: true

- name: Install VS Code extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  loop: "{{ lookup('file', role_path + '/files/extensions.txt').splitlines() | select | list }}"
  register: ext_result
  changed_when: "'was successfully installed' in ext_result.stdout"
  failed_when: false
