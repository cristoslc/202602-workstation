---
# SOPS/age sub-task: install tools, resolve age key, decrypt secret dotfiles.

- name: Install sops and age (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew:
    name:
      - sops
      - age
    state: present

- name: Install sops and age (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Install age
      ansible.builtin.apt:
        name: age
        state: present
      become: true

    - name: Check if sops is installed
      ansible.builtin.command: sops --version
      register: _sops_check
      changed_when: false
      failed_when: false

    - name: Install sops from GitHub release
      when: _sops_check.rc != 0
      block:
        - name: Download sops .deb
          ansible.builtin.get_url:
            url: "https://github.com/getsops/sops/releases/download/v3.9.4/sops_3.9.4_amd64.deb"
            dest: /tmp/sops.deb
            mode: "0644"
          register: _sops_download
          retries: 3
          delay: 5
          until: _sops_download is not failed

        - name: Install sops .deb
          ansible.builtin.apt:
            deb: /tmp/sops.deb
            state: present
          become: true

        - name: Clean up sops .deb
          ansible.builtin.file:
            path: /tmp/sops.deb
            state: absent

- name: Check for age key
  ansible.builtin.stat:
    path: "{{ age_keyfile }}"
  register: age_key_stat

- name: Try retrieving age key from 1Password
  when: not age_key_stat.stat.exists
  block:
    - name: Check if 1Password CLI is available
      ansible.builtin.command: op --version
      register: op_check
      changed_when: false
      failed_when: false

    - name: Retrieve age key from 1Password
      when: op_check.rc == 0
      ansible.builtin.shell: |
        mkdir -p -m 700 "$(dirname '{{ age_keyfile }}')"
        op read "{{ onepassword_age_key_ref }}" > "{{ age_keyfile }}"
      args:
        creates: "{{ age_keyfile }}"
      register: op_read_result
      failed_when: false
      no_log: true

    - name: Warn if 1Password retrieval failed
      when:
        - op_check.rc == 0
        - op_read_result is defined
        - op_read_result.rc != 0
      ansible.builtin.debug:
        msg: >
          1Password CLI is installed but failed to retrieve the age key.
          Ensure the 1Password desktop app is running and unlocked,
          and that {{ onepassword_age_key_ref }} exists in your vault.

- name: Set age key permissions
  ansible.builtin.file:
    path: "{{ age_keyfile }}"
    mode: "0600"
  when: age_key_stat.stat.exists or (op_check is defined and op_check.rc == 0)

- name: Set age key directory permissions
  ansible.builtin.file:
    path: "{{ age_keyfile | dirname }}"
    mode: "0700"
  when: age_key_stat.stat.exists or (op_check is defined and op_check.rc == 0)

- name: Refresh age key status
  ansible.builtin.stat:
    path: "{{ age_keyfile }}"
  register: age_key_final

- name: Decrypt shared secret dotfiles
  when: age_key_final.stat.exists
  ansible.builtin.include_tasks: decrypt-tree.yml
  vars:
    secrets_source: "{{ workstation_dir }}/shared/secrets/dotfiles"
    secrets_target: "{{ workstation_dir }}/shared/secrets/.decrypted/dotfiles"

- name: Decrypt platform secret dotfiles
  when: age_key_final.stat.exists
  ansible.builtin.include_tasks: decrypt-tree.yml
  vars:
    secrets_source: "{{ workstation_dir }}/{{ platform_dir }}/secrets/dotfiles"
    secrets_target: "{{ workstation_dir }}/{{ platform_dir }}/secrets/.decrypted/dotfiles"

- name: Warn if no age key available
  when: not age_key_final.stat.exists
  ansible.builtin.debug:
    msg: >
      Age key not found. Secret dotfiles will not be decrypted.
      Place your key at {{ age_keyfile }} and re-run bootstrap.
