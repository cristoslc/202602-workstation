---
# 1Password sub-task
- name: Install 1Password (macOS)
  when: ansible_os_family == "Darwin"
  block:
    - name: Install 1Password via Homebrew
      community.general.homebrew_cask:
        name: 1password
        state: present

    - name: Install 1Password CLI via Homebrew
      community.general.homebrew_cask:
        name: 1password-cli
        state: present

- name: Install 1Password (Debian)
  when: ansible_os_family == "Debian"
  block:
    - name: Add 1Password GPG key
      ansible.builtin.apt_key:
        url: https://downloads.1password.com/linux/keys/1password.asc
        keyring: /usr/share/keyrings/1password-archive-keyring.gpg
        state: present
      become: true

    - name: Add 1Password apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
        state: present
      become: true

    - name: Install 1Password and CLI
      ansible.builtin.apt:
        name:
          - 1password
          - 1password-cli
        state: present
        update_cache: true
      become: true

- name: Ensure SSH config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh/config.d"
    state: directory
    mode: "0700"

- name: Set SSH config permissions
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh/config"
    mode: "0600"
  when: ansible_env.HOME ~ '/.ssh/config' is file
