---
# macOS: media apps installed via Brewfile; Downie via Setapp.

- name: Verify Spotify is installed
  ansible.builtin.command: brew list --cask spotify
  register: spotify_check
  changed_when: false
  failed_when: false

- name: Note about Spotify
  when: spotify_check.rc != 0
  ansible.builtin.debug:
    msg: "Spotify not installed. Add 'spotify' to Brewfile and run brew bundle."

- name: Verify VLC is installed
  ansible.builtin.command: brew list --cask vlc
  register: vlc_check
  changed_when: false
  failed_when: false

- name: Note about VLC
  when: vlc_check.rc != 0
  ansible.builtin.debug:
    msg: "VLC not installed. Add 'vlc' to Brewfile and run brew bundle."

# --- Setapp-managed media tools ---

- name: Check if Downie is installed
  ansible.builtin.stat:
    path: /Applications/Setapp/Downie.app
  register: downie_check

- name: Remind to install Downie via Setapp
  when: not downie_check.stat.exists
  ansible.builtin.debug:
    msg: "Downie is not installed. Install it via Setapp for video downloads."
