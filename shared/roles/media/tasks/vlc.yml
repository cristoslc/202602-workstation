---
# VLC sub-task
- name: Install VLC (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: vlc
    state: present

- name: Install VLC (Debian)
  when: ansible_facts.os_family == "Debian"
  ansible.builtin.apt:
    name: vlc
    state: present
  become: true
