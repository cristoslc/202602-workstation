---
- name: Restart Syncthing (Linux)
  ansible.builtin.systemd:
    name: "syncthing@{{ ansible_user_id }}"
    state: restarted
  become: true
  when: ansible_facts.os_family != 'Darwin'

- name: Restart Syncthing (macOS)
  ansible.builtin.shell:
    cmd: |
      osascript -e 'tell application "Syncthing" to quit' 2>/dev/null || true
      sleep 2
      open -a Syncthing
    executable: /bin/bash
  changed_when: false
  when: ansible_facts.os_family == 'Darwin'
