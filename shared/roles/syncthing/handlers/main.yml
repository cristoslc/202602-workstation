---
- name: Restart Syncthing (Linux)
  ansible.builtin.systemd:
    name: "syncthing@{{ ansible_user_id }}"
    state: restarted
  become: true
  when: ansible_facts.os_family != 'Darwin'

- name: Restart Syncthing (macOS)
  ansible.builtin.command:
    cmd: >-
      launchctl kickstart -k gui/{{ ansible_facts.user_uid }}/com.syncthing.syncthing
  changed_when: false
  when: ansible_facts.os_family == 'Darwin'
