---
# Install Syncthing on macOS via Homebrew cask (syncthing-macos app).
# The cask bundles syncthing + a native menu bar icon in a single app,
# avoiding two competing instances (formula CLI daemon vs GUI app).

- name: Install Syncthing macOS app via Homebrew cask
  community.general.homebrew_cask:
    name: syncthing
    state: present

- name: Check if Syncthing app is running
  ansible.builtin.command:
    cmd: pgrep -xq Syncthing
  register: _syncthing_running
  changed_when: false
  failed_when: false

- name: Launch Syncthing app
  ansible.builtin.command:
    cmd: open -a Syncthing
  when: _syncthing_running.rc != 0
  changed_when: true
