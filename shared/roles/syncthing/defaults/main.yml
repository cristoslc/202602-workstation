---
# Syncthing role defaults
# Override these in group_vars or host_vars as needed.

# Whether to enable Syncthing service on this machine
syncthing_enabled: true

# Syncthing version to install (Linux apt repo tracks latest stable)
syncthing_release_channel: stable

# @tui secret label="Syncthing hub device ID" placeholder="XXXXXXX-XXXXXXX-..."
syncthing_hub_device_id: ""        # must be set for pairing

# @tui secret label="Syncthing hub address" placeholder="100.x.y.z"
syncthing_hub_address: ""          # Tailscale IP or hostname

# User data folders to sync via Syncthing (relative to $HOME)
syncthing_user_folders:
  - Documents
  - Pictures
  - Music
  - Videos
  - Downloads

# Syncthing GUI listen address (localhost only for security)
syncthing_gui_address: "127.0.0.1:8384"

# Enable Staggered file versioning on synced folders
syncthing_versioning_type: staggered
syncthing_versioning_params:
  maxAge: "2592000"       # 30 days in seconds
  cleanInterval: "3600"   # check every hour
  versionsPath: ""        # empty = .stversions inside folder

# Enable case-sensitive FS handling (important for macOS APFS)
syncthing_case_sensitive_fs: "{{ ansible_facts.os_family == 'Darwin' }}"
