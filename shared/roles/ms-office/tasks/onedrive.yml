---
# OneDrive sub-task
- name: Install OneDrive (macOS)
  when: ansible_facts.os_family == "Darwin"
  block:
    - name: Verify OneDrive is installed
      ansible.builtin.command: brew list --cask onedrive
      register: onedrive_check
      changed_when: false
      failed_when: false

    - name: Note about OneDrive
      when: onedrive_check.rc != 0
      ansible.builtin.debug:
        msg: "OneDrive not installed. Add 'onedrive' to Brewfile and run brew bundle."

- name: Install OneDrive (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Add abraunegg OneDrive PPA
      ansible.builtin.apt_repository:
        repo: ppa:yann1ck/onedrive
        filename: onedrive
        state: present
      become: true

    - name: Install OneDrive client
      ansible.builtin.apt:
        name: onedrive
        state: present
        update_cache: true
      become: true
