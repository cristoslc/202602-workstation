---
# direnv sub-task
- name: Install direnv (macOS)
  when: ansible_os_family == "Darwin"
  community.general.homebrew:
    name: direnv
    state: present

- name: Install direnv (Debian)
  when: ansible_os_family == "Debian"
  ansible.builtin.apt:
    name: direnv
    state: present
  become: true
