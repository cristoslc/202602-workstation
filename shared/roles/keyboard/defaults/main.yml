---
# Action registry: semantic actions with per-platform keybindings and implementations.
# The keyboard role reads this to configure Hammerspoon (macOS) and dconf (Linux).
#
# Modifier strategy — same physical keys on both platforms:
#   macOS Cmd  =  Linux Super  (same physical key)
#   +Shift where the bare combo conflicts (e.g. Cmd+V = paste → Cmd+Shift+V)
#
# This means muscle memory transfers 1:1 between machines.

workstation_actions:
- action: open_launcher
  description: Open app launcher
  keybinding:
    linux: <Ctrl><Shift>space
    macos:
      mods:
      - ctrl
      - shift
      key: space
  implementation:
    linux:
      type: dconf
      command: vicinae toggle
    macos:
      type: hammerspoon
      lua: hs.execute("open raycast://", true)
- action: clipboard_history
  description: Clipboard history
  keybinding:
    linux: <Super><Shift>v
    macos:
      mods:
      - cmd
      - shift
      key: v
  implementation:
    linux:
      type: dconf
      command: xdg-open vicinae://extensions/vicinae/clipboard/history
    macos:
      type: hammerspoon
      lua: hs.execute("open raycast://extensions/raycast/clipboard-history/clipboard-history", true)
- action: emoji_picker
  description: Emoji picker
  keybinding:
    linux: <Super><Shift>e
    macos:
      mods:
      - cmd
      - shift
      key: e
  implementation:
    linux:
      type: dconf
      command: xdg-open vicinae://extensions/vicinae/emoji
    macos:
      type: hammerspoon
      lua: hs.execute("open raycast://extensions/raycast/emoji-symbols/search-emoji-symbols", true)
- action: screenshot_region
  description: Screenshot selected region
  keybinding:
    linux: <Super><Shift>4
    macos:
      mods:
      - cmd
      - shift
      key: '4'
  implementation:
    linux:
      type: dconf
      command: flameshot gui
    macos:
      type: hammerspoon
      lua: hs.execute("open \"cleanshot://capture-area\"", true)
- action: screenshot_full
  description: Screenshot full screen
  keybinding:
    linux: <Super><Shift>3
    macos:
      mods:
      - cmd
      - shift
      key: '3'
  implementation:
    linux:
      type: dconf
      command: flameshot full --path ~/Screenshots
    macos:
      type: hammerspoon
      lua: hs.eventtap.keyStroke({"cmd", "shift"}, "3")
- action: window_left_half
  description: Tile window left half
  keybinding:
    linux: <Super>Left
    macos:
      mods:
      - cmd
      key: left
  implementation:
    linux:
      type: dconf_wm
      dconf_key: push-tile-left
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit(hs.layout.left50) end
- action: window_right_half
  description: Tile window right half
  keybinding:
    linux: <Super>Right
    macos:
      mods:
      - cmd
      key: right
  implementation:
    linux:
      type: dconf_wm
      dconf_key: push-tile-right
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit(hs.layout.right50) end
- action: window_maximize
  description: Maximize window
  keybinding:
    linux: <Super>Up
    macos:
      mods:
      - cmd
      key: up
  implementation:
    linux:
      type: dconf_wm
      dconf_key: toggle-maximized
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:maximize() end
- action: window_restore
  description: Restore window
  keybinding:
    linux: <Super>Down
    macos:
      mods:
      - cmd
      key: down
  implementation:
    linux:
      type: dconf_wm
      dconf_key: unmaximize
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 0.1, y = 0.1, w = 0.8, h = 0.8}) end
- action: window_next_monitor
  description: Move window to next monitor
  keybinding:
    linux: <Super><Shift>Right
    macos:
      mods:
      - cmd
      - shift
      key: right
  implementation:
    linux:
      type: dconf_wm
      dconf_key: move-to-monitor-right
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToScreen(win:screen():next()) end
- action: window_prev_monitor
  description: Move window to previous monitor
  keybinding:
    linux: <Super><Shift>Left
    macos:
      mods:
      - cmd
      - shift
      key: left
  implementation:
    linux:
      type: dconf_wm
      dconf_key: move-to-monitor-left
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToScreen(win:screen():previous()) end
- action: window_fullscreen
  description: Toggle fullscreen
  keybinding:
    linux: <Ctrl><Super><Alt>f
    macos:
      mods:
      - ctrl
      - cmd
      - alt
      key: f
  implementation:
    linux:
      type: dconf_wm
      dconf_key: toggle-fullscreen
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:setFullScreen(not win:isFullScreen()) end
- action: window_center_two_thirds
  description: Center window at two-thirds width
  keybinding:
    linux: <Ctrl><Super><Alt>space
    macos:
      mods:
      - ctrl
      - cmd
      - alt
      key: space
  implementation:
    linux:
      type: dconf
      command: >-
        bash -c 'read W H < <(xdotool getdisplaygeometry);
        xdotool getactivewindow windowsize $((2*W/3)) $H windowmove $((W/6)) 0'
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 1/6, y = 0, w = 2/3, h = 1}) end
- action: window_left_third
  description: Tile window left third
  keybinding:
    linux: <Ctrl><Super>d
    macos:
      mods:
      - cmd
      - alt
      key: d
  implementation:
    linux:
      type: dconf
      command: >-
        bash -c 'read W H < <(xdotool getdisplaygeometry);
        xdotool getactivewindow windowsize $((W/3)) $H windowmove 0 0'
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 0, y = 0, w = 1/3, h = 1}) end
- action: window_center_third
  description: Tile window center third
  keybinding:
    linux: <Ctrl><Super>f
    macos:
      mods:
      - cmd
      - alt
      key: f
  implementation:
    linux:
      type: dconf
      command: >-
        bash -c 'read W H < <(xdotool getdisplaygeometry);
        xdotool getactivewindow windowsize $((W/3)) $H windowmove $((W/3)) 0'
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 1/3, y = 0, w = 1/3, h = 1}) end
- action: window_right_third
  description: Tile window right third
  keybinding:
    linux: <Ctrl><Super>g
    macos:
      mods:
      - cmd
      - alt
      key: g
  implementation:
    linux:
      type: dconf
      command: >-
        bash -c 'read W H < <(xdotool getdisplaygeometry);
        xdotool getactivewindow windowsize $((2*W/3)) $H windowmove $((2*W/3)) 0'
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 2/3, y = 0, w = 1/3, h = 1}) end
- action: window_left_two_thirds
  description: Tile window left two-thirds
  keybinding:
    linux: <Ctrl><Super>e
    macos:
      mods:
      - cmd
      - alt
      key: e
  implementation:
    linux:
      type: dconf
      command: >-
        bash -c 'read W H < <(xdotool getdisplaygeometry);
        xdotool getactivewindow windowsize $((2*W/3)) $H windowmove 0 0'
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 0, y = 0, w = 2/3, h = 1}) end
- action: window_right_two_thirds
  description: Tile window right two-thirds
  keybinding:
    linux: <Ctrl><Super>r
    macos:
      mods:
      - cmd
      - alt
      key: r
  implementation:
    linux:
      type: dconf
      command: >-
        bash -c 'read W H < <(xdotool getdisplaygeometry);
        xdotool getactivewindow windowsize $((2*W/3)) $H windowmove $((W/3)) 0'
    macos:
      type: hammerspoon
      lua: |
        local win = hs.window.focusedWindow()
        if win then win:moveToUnit({x = 1/3, y = 0, w = 2/3, h = 1}) end
- action: window_hide
  description: Hide window
  keybinding:
    linux: <Super>h
    macos:
      mods:
      - cmd
      key: h
  implementation:
    linux:
      type: dconf_wm
      dconf_key: minimize
    macos:
      type: hammerspoon
      lua: |
        local app = hs.application.frontmostApplication()
        if app then app:hide() end
