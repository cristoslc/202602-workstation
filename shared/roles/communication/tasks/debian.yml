---
# Linux: install Slack and Signal via their apt repos.
# Note: snap is avoided because Linux Mint removes snapd by default.

- name: Create temp file for Slack download
  ansible.builtin.tempfile:
    suffix: .deb
  register: slack_tmp

- name: Download Slack .deb
  ansible.builtin.get_url:
    url: "{{ slack_url }}"
    dest: "{{ slack_tmp.path }}"
    checksum: "sha256:{{ slack_sha256 }}"
    mode: "0644"

- name: Install Slack .deb
  ansible.builtin.apt:
    deb: "{{ slack_tmp.path }}"
    state: present
  become: true

- name: Clean up Slack temp file
  ansible.builtin.file:
    path: "{{ slack_tmp.path }}"
    state: absent

- name: Download and refresh Signal GPG key
  ansible.builtin.get_url:
    url: https://updates.signal.org/desktop/apt/keys.asc
    dest: /tmp/signal-key.asc
    mode: "0644"
    force: true
  become: true

- name: Dearmor Signal GPG key
  ansible.builtin.shell: gpg --batch --yes --dearmor -o /usr/share/keyrings/signal-desktop-keyring.gpg /tmp/signal-key.asc
  become: true
  changed_when: true

- name: Clean up Signal key temp file
  ansible.builtin.file:
    path: /tmp/signal-key.asc
    state: absent

- name: Add Signal apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/signal-desktop-keyring.gpg] https://updates.signal.org/desktop/apt xenial main"
    state: present
  become: true

- name: Install Signal Desktop
  ansible.builtin.apt:
    name: signal-desktop
    state: present
    update_cache: true
  become: true
