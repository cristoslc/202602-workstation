---
# macOS: communication apps installed via Brewfile. Verify presence.

- name: Verify Slack is installed
  ansible.builtin.command: brew list --cask slack
  register: slack_check
  changed_when: false
  failed_when: false

- name: Note about Slack
  when: slack_check.rc != 0
  ansible.builtin.debug:
    msg: "Slack not installed. Add 'slack' to Brewfile and run brew bundle."

- name: Verify Signal is installed
  ansible.builtin.command: brew list --cask signal
  register: signal_check
  changed_when: false
  failed_when: false

- name: Note about Signal
  when: signal_check.rc != 0
  ansible.builtin.debug:
    msg: "Signal not installed. Add 'signal' to Brewfile and run brew bundle."
