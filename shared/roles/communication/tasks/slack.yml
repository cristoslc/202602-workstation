---
# Slack sub-task
- name: Install Slack (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: slack
    state: present

- name: Install Slack (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check if Slack is already installed
      ansible.builtin.command: dpkg-query -W slack-desktop
      register: _slack_installed
      changed_when: false
      failed_when: false

    - name: Install Slack from latest .deb
      when: _slack_installed.rc != 0
      block:
        - name: Query Slack API for latest release URL
          ansible.builtin.uri:
            url: "https://slack.com/api/desktop.latestRelease?variant=deb&arch=x64"
            return_content: true
          register: _slack_api
          retries: 3
          delay: 5
          until: _slack_api is not failed

        - name: Extract Slack download URL
          ansible.builtin.set_fact:
            _slack_deb_url: "{{ _slack_api.json.download_url }}"

        - name: Create temp file for Slack download
          ansible.builtin.tempfile:
            suffix: .deb
          register: _slack_tmp

        - name: Download latest Slack .deb
          ansible.builtin.get_url:
            url: "{{ _slack_deb_url }}"
            dest: "{{ _slack_tmp.path }}"
            mode: "0644"
            force: true
          register: _slack_download
          retries: 3
          delay: 5
          until: _slack_download is not failed

        - name: Verify Slack .deb is not truncated
          ansible.builtin.stat:
            path: "{{ _slack_tmp.path }}"
          register: _slack_stat
          failed_when: _slack_stat.stat.size < 50000000

        - name: Install Slack .deb
          ansible.builtin.apt:
            deb: "{{ _slack_tmp.path }}"
            state: present
          become: true

        - name: Clean up Slack temp file
          ansible.builtin.file:
            path: "{{ _slack_tmp.path }}"
            state: absent
