---
# Signal sub-task
- name: Install Signal (macOS)
  when: ansible_facts.os_family == "Darwin"
  community.general.homebrew_cask:
    name: signal
    state: present

- name: Install Signal (Debian)
  when: ansible_facts.os_family == "Debian"
  block:
    - name: Check if Signal keyring exists
      ansible.builtin.stat:
        path: /usr/share/keyrings/signal-desktop-keyring.gpg
      register: _signal_keyring

    - name: Install Signal GPG key
      when: not _signal_keyring.stat.exists
      block:
        - name: Download Signal GPG key
          ansible.builtin.get_url:
            url: https://updates.signal.org/desktop/apt/keys.asc
            dest: /tmp/signal-key.asc
            mode: "0644"
          become: true
          register: _signal_key_download
          retries: 3
          delay: 5
          until: _signal_key_download is not failed

        - name: Dearmor Signal GPG key
          ansible.builtin.command: gpg --batch --yes --dearmor -o /usr/share/keyrings/signal-desktop-keyring.gpg /tmp/signal-key.asc
          become: true

        - name: Clean up Signal key temp file
          ansible.builtin.file:
            path: /tmp/signal-key.asc
            state: absent
          become: true

    - name: Add Signal apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/signal-desktop-keyring.gpg] https://updates.signal.org/desktop/apt xenial main"
        filename: signal
        state: present
      become: true

    - name: Install Signal Desktop
      ansible.builtin.apt:
        name: signal-desktop
        state: present
        update_cache: true
      become: true
