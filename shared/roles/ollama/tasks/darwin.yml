---
- name: Install Ollama via Homebrew cask
  community.general.homebrew_cask:
    name: ollama
    state: present

- name: Check if Ollama server is running
  ansible.builtin.command: pgrep -f "Ollama"
  register: _ollama_running
  changed_when: false
  failed_when: false

- name: Start Ollama app (needed for model pulls)
  ansible.builtin.command: open -a Ollama
  when: _ollama_running.rc != 0
  changed_when: true

- name: Wait for Ollama server to be ready
  ansible.builtin.uri:
    url: "http://localhost:11434/api/tags"
    method: GET
  register: _ollama_ready
  until: _ollama_ready.status == 200
  retries: 10
  delay: 2
  when: _ollama_running.rc != 0
