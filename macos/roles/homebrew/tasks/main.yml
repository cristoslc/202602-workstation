---
- name: Check if Homebrew is installed
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: homebrew_check

- name: Download Homebrew installer
  when: not homebrew_check.stat.exists
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
    dest: /tmp/brew-install.sh
    mode: "0755"
  register: _brew_download
  retries: 3
  delay: 5
  until: _brew_download is not failed

- name: Run Homebrew installer
  when: not homebrew_check.stat.exists
  ansible.builtin.command: /bin/bash /tmp/brew-install.sh
  args:
    creates: /opt/homebrew/bin/brew
  environment:
    NONINTERACTIVE: "1"

- name: Clean up Homebrew installer
  ansible.builtin.file:
    path: /tmp/brew-install.sh
    state: absent

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true

- name: Install base CLI tools
  community.general.homebrew:
    name:
      - jq
      - wget
      - ripgrep
      - fd
      - fzf
      - bat
      - eza
      - tree
      - htop
      - dust
      - duf
      - tldr
      - mc
      - gum
    state: present

- name: Install base macOS casks
  community.general.homebrew_cask:
    name:
      - setapp
      - jordanbaird-ice
    state: present
