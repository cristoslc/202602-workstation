---
- name: "Phase 3: Desktop environment"
  hosts: localhost
  connection: local

  module_defaults:
    ansible.builtin.apt:
      lock_timeout: 300

  roles:
    - role: browsers
      tags: [browsers, firefox, brave, chrome, desktop]

    - role: launchers
      tags: [launchers, vicinae, desktop]

    - role: text-expansion
      tags: [text-expansion, espanso, desktop]

    - role: notes
      tags: [notes, normcap, linnote, desktop]

    - role: markdown-viewer
      tags: [markdown-viewer, typora, desktop]

    - role: calendar
      tags: [calendar, desktop]

    - role: communication
      tags: [communication, slack, signal, desktop]

    - role: media
      tags: [media, spotify, vlc, desktop]

    - role: vpn
      tags: [vpn, tailscale, surfshark, desktop]

    - role: remote-desktop
      tags: [remote-desktop, rustdesk, remmina, desktop]

    - role: display
      tags: [display, weylus, desktop]

    - role: backups
      tags: [backups, timeshift, restic, backrest, desktop]

    - role: screenshots
      tags: [screenshots, flameshot, desktop]

    - role: link-handler
      tags: [link-handler, xdg-mime, desktop]

    - role: stream-deck
      tags: [stream-deck, opendeck, desktop]

    - role: ollama
      tags: [ollama, desktop]

    - role: tesseract
      tags: [tesseract, desktop]

    - role: utilities
      tags: [utilities, desktop]

    - role: file-transfer
      tags: [file-transfer, filezilla, desktop]

    - role: power
      tags: [power, desktop]

    - role: keyboard
      tags: [keyboard, keybindings, desktop]

    - role: desktop-env
      tags: [desktop-env, cinnamon, desktop]

    - role: dev
      tags: [dev, desktop]
