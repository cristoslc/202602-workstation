---
- name: "Phase 0: System foundation"
  hosts: localhost
  connection: local

  pre_tasks:
    - name: Verify running on Debian-based Linux
      ansible.builtin.assert:
        that: ansible_os_family == "Debian"
        fail_msg: "This playbook is for Debian-based Linux only."

    # Remove ALL apt source files that reference repos whose Signed-By
    # values conflict (e.g. VS Code creates its own source with a different
    # keyring than our Ansible role). Content-based matching catches every
    # variant regardless of filename or format (.list / .sources).
    - name: Find conflicting VS Code apt sources
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d
        patterns: ["*.list", "*.sources"]
        contains: "packages\\.microsoft\\.com/repos/code"
      register: _stale_vscode_sources
      become: true

    - name: Remove conflicting VS Code apt sources
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _stale_vscode_sources.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      become: true

    - name: Find conflicting 1Password apt sources
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d
        patterns: ["*.list", "*.sources"]
        contains: "downloads\\.1password\\.com"
      register: _stale_1password_sources
      become: true

    - name: Remove conflicting 1Password apt sources
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _stale_1password_sources.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      become: true

  roles:
    - role: base
      tags: [base, system]
      when: apply_system_roles | default(true) | bool

    - role: system
      tags: [system]
      when: apply_system_roles | default(true) | bool
