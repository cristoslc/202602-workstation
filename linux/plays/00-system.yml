---
- name: "Phase 0: System foundation"
  hosts: localhost
  connection: local

  module_defaults:
    ansible.builtin.apt:
      lock_timeout: 300

  pre_tasks:
    - name: Verify running on Debian-based Linux
      ansible.builtin.assert:
        that: ansible_facts.os_family == "Debian"
        fail_msg: "This playbook is for Debian-based Linux only."

    # Other apt/dpkg processes (unattended-upgrades, stuck post-install
    # scripts) can hold the dpkg lock indefinitely, blocking every apt
    # task. Stop the auto-updater, kill any stale lock holders, repair
    # partial installs, then wait for locks to clear.
    - name: Stop unattended-upgrades to prevent apt lock contention
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      become: true
      failed_when: false
      tags: [always]

    - name: Kill stale apt/dpkg processes holding locks
      ansible.builtin.shell: |
        set -euo pipefail
        killed=0
        for lockfile in /var/lib/dpkg/lock-frontend \
                        /var/lib/apt/lists/lock \
                        /var/cache/apt/archives/lock; do
          for pid in $(fuser "$lockfile" 2>/dev/null || true); do
            [ -d "/proc/$pid" ] || continue
            age=$(( $(date +%s) - $(stat -c %Y "/proc/$pid") ))
            if [ "$age" -gt 600 ]; then
              echo "Killing stale process $pid (age: ${age}s, cmd: $(cat /proc/$pid/cmdline 2>/dev/null | tr '\0' ' '))"
              kill "$pid" 2>/dev/null || true
              killed=1
            fi
          done
        done
        [ "$killed" -eq 1 ] && echo "CHANGED" || echo "OK"
      args:
        executable: /bin/bash
      become: true
      register: _stale_apt_kill
      changed_when: "'CHANGED' in _stale_apt_kill.stdout"
      tags: [always]

    - name: Repair partially configured packages
      ansible.builtin.command: dpkg --configure -a
      become: true
      changed_when: false
      when: _stale_apt_kill is changed
      tags: [always]

    - name: Wait for dpkg/apt locks to be released
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock-frontend \
                    /var/lib/apt/lists/lock \
                    /var/cache/apt/archives/lock >/dev/null 2>&1; do
          sleep 5
        done
      args:
        executable: /bin/bash
      become: true
      changed_when: false
      tags: [always]

    # 1Password's post-install can create conflicting apt source files.
    # We manage 1password.list with signed-by=, so remove any others.
    - name: Remove conflicting 1Password apt sources
      ansible.builtin.shell: |
        set -euo pipefail
        found=0
        for f in $(grep -rl 'downloads\.1password\.com' /etc/apt/sources.list.d/ 2>/dev/null || true); do
          case "$(basename "$f")" in
            1password.list|1password.sources) continue ;;
          esac
          echo "Removing $f"
          rm -f "$f"
          found=1
        done
        if grep -q 'downloads\.1password\.com' /etc/apt/sources.list 2>/dev/null; then
          echo "Cleaning /etc/apt/sources.list"
          sed -i '/downloads\.1password\.com/d' /etc/apt/sources.list
          found=1
        fi
        [ "$found" -eq 1 ] && echo "CHANGED" || echo "OK"
      args:
        executable: /bin/bash
      register: _1password_cleanup
      changed_when: "'CHANGED' in _1password_cleanup.stdout"
      become: true

    # Remove old Ansible-managed apt sources whose filenames differ from
    # what vendor post-install scripts create. Chrome (google-chrome.list)
    # and VS Code (vscode.list / vscode.sources) reuse the same filenames
    # and keys as their vendor scripts, so we leave them alone.
    - name: Remove Ansible-managed apt sources superseded by vendor repos
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/steam.list
        - /etc/apt/sources.list.d/cli_github_com_packages.list
      become: true

    - name: Remove expired packagecloud GPG key
      ansible.builtin.file:
        path: /etc/apt/trusted.gpg.d/packagecloud.gpg
        state: absent
      become: true

    # google-chrome-keyring.gpg is referenced by Chrome's signed-by=
    # source. microsoft.gpg is VS Code's canonical vendor key
    # (written by its postinst). Neither is an orphan — leave them.
    - name: Remove orphan GPG keys
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/trusted.gpg.d/brave-browser-release.gpg
        - /usr/share/keyrings/brave-browser-beta-archive-keyring.gpg
        - /usr/share/keyrings/brave-browser-nightly-archive-keyring.gpg
        - /usr/share/keyrings/microsoft-archive-keyring.gpg
        - /etc/apt/trusted.gpg.d/linuxmint.key.asc
      become: true

  roles:
    - role: base
      tags: [base, system]
      when: apply_system_roles | default(true) | bool

    - role: system
      tags: [system]
      when: apply_system_roles | default(true) | bool

    - role: hardware
      tags: [hardware, thinkpad, system]
      when: apply_system_roles | default(true) | bool
