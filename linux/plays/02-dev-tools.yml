---
- name: "Phase 2: Development tools"
  hosts: localhost
  connection: local

  module_defaults:
    ansible.builtin.apt:
      lock_timeout: 300

  roles:
    - role: git
      tags: [git, gh, lazygit, delta, dev-tools]

    - role: shell
      tags: [shell, zsh, direnv, dev-tools]

    - role: python
      tags: [python, dev-tools]

    - role: node
      tags: [node, dev-tools]

    - role: docker
      tags: [docker, mcp-gateway, dev-tools]

    - role: editor
      tags: [editor, vscode, dev-tools]

    - role: claude-code
      tags: [claude-code, dev-tools]

    - role: codex-cli
      tags: [codex-cli, dev-tools]

    - role: gemini-cli
      tags: [gemini-cli, dev-tools]

    - role: fonts
      tags: [fonts, dev-tools]

    - role: terminal
      tags: [terminal, tmux, dev-tools]

    - role: lint-tools
      tags: [lint-tools, shellcheck, yamllint, ansible-lint, bats, dev-tools]
