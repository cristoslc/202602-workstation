---
- name: "Phase 8: File sync (Syncthing + Unison)"
  hosts: localhost
  connection: local

  module_defaults:
    ansible.builtin.apt:
      lock_timeout: 300

  roles:
    - role: syncthing
      tags: [syncthing, sync]

    - role: unison
      tags: [unison, wsync, sync]

    - role: sync-monitor
      when: sync_monitor_hub_address | default('') | length > 0
      tags: [sync-monitor, sync]

    - role: git-repo-scanner
      tags: [git-repo-scanner, sync]

    - role: propagation
      when: propagation_enabled | default(true) | bool
      tags: [propagation, sync]
