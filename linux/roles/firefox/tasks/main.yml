---
- name: Verify Firefox is installed (Mint ships .deb by default)
  ansible.builtin.command: firefox --version
  register: firefox_check
  changed_when: false
  failed_when: false

- name: Install Firefox if not present
  when: firefox_check.rc != 0
  ansible.builtin.apt:
    name: firefox
    state: present
  become: true

- name: Set Firefox as default browser
  ansible.builtin.command: xdg-settings set default-web-browser firefox.desktop
  changed_when: false
  failed_when: false
