---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - build-essential
      - curl
      - wget
      - unzip
      - htop
      - jq
      - ripgrep
      - fd-find
      - bat
      - tree
      - fzf
      - tldr
      - mc
      - software-properties-common
    state: present
  become: true

- name: Install dust (du replacement) from GitHub releases
  ansible.builtin.shell: |
    DUST_VERSION=$(curl -s https://api.github.com/repos/bootandy/dust/releases/latest | grep -Po '"tag_name": "v\K[^"]*')
    curl -fsSL "https://github.com/bootandy/dust/releases/latest/download/dust-v${DUST_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xzf - --strip-components=1 -C /usr/local/bin --wildcards '*/dust'
  args:
    creates: /usr/local/bin/dust
  become: true

- name: Install duf (df replacement) from GitHub releases
  ansible.builtin.shell: |
    DUF_VERSION=$(curl -s https://api.github.com/repos/muesli/duf/releases/latest | grep -Po '"tag_name": "v\K[^"]*')
    curl -fsSL "https://github.com/muesli/duf/releases/latest/download/duf_${DUF_VERSION}_linux_amd64.deb" -o /tmp/duf.deb
    dpkg -i /tmp/duf.deb
    rm -f /tmp/duf.deb
  args:
    creates: /usr/bin/duf
  become: true
