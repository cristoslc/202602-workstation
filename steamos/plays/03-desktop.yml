---
- name: "Phase 3: Desktop apps (Flatpak)"
  hosts: localhost
  connection: local

  pre_tasks:
    - name: Verify running on SteamOS
      ansible.builtin.assert:
        that: ansible_distribution is search("SteamOS")
        fail_msg: "This playbook is for SteamOS (Steam Deck) only."

  roles:
    - role: steamos-flatpak
      tags: [flatpak, desktop]
