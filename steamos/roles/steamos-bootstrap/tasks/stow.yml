---
# Install GNU Stow via Nix profile.
# Idempotent: nix profile install is a no-op if already installed.

- name: Check if stow is already installed
  ansible.builtin.command:
    cmd: "{{ ansible_facts.env.HOME }}/.nix-profile/bin/stow --version"
  register: _stow_check
  changed_when: false
  failed_when: false

- name: Install GNU Stow via Nix profile
  ansible.builtin.command:
    cmd: "{{ ansible_facts.env.HOME }}/.nix-profile/bin/nix profile install nixpkgs#stow"
  when: _stow_check.rc != 0
  changed_when: true

- name: Verify stow is available
  ansible.builtin.command:
    cmd: "{{ ansible_facts.env.HOME }}/.nix-profile/bin/stow --version"
  register: _stow_version
  changed_when: false
  failed_when: _stow_version.rc != 0
