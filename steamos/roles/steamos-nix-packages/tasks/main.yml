---
# steamos-nix-packages role: declarative CLI tool installation via Nix profile.
# Only runs when ansible_distribution is search("SteamOS").
# All packages are installed to the user's Nix profile (~/.nix-profile),
# which persists across SteamOS OS updates.

- name: SteamOS Nix package management
  when: ansible_distribution is search("SteamOS")
  block:
    - name: Get currently installed Nix profile packages
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.nix-profile/bin/nix profile list --json"
      register: _nix_profile_list
      changed_when: false
      failed_when: false

    - name: Parse installed Nix package names
      ansible.builtin.set_fact:
        _nix_installed_pkgs: >-
          {{
            (_nix_profile_list.stdout | from_json).elements
            | map(attribute='attrPath')
            | map('regex_replace', '^legacyPackages\\.[^.]+\\.', '')
            | list
          }}
      when: _nix_profile_list.rc == 0 and _nix_profile_list.stdout | length > 0

    - name: Set empty installed packages when profile is empty
      ansible.builtin.set_fact:
        _nix_installed_pkgs: []
      when: _nix_profile_list.rc != 0 or _nix_profile_list.stdout | length == 0

    - name: Install missing Nix packages
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.nix-profile/bin/nix profile install nixpkgs#{{ item }}"
      loop: "{{ nix_packages }}"
      when: item not in _nix_installed_pkgs
      changed_when: true

    - name: Remove deprecated Nix packages
      ansible.builtin.command:
        cmd: "{{ ansible_facts.env.HOME }}/.nix-profile/bin/nix profile remove nixpkgs#{{ item }}"
      loop: "{{ nix_packages_remove }}"
      when:
        - nix_packages_remove | length > 0
        - item in _nix_installed_pkgs
      changed_when: true
      failed_when: false
